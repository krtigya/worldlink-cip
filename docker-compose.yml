version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: cip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       worldlink_cip
      POSTGRES_USER:     cip_user
      POSTGRES_PASSWORD: cip_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cip_user -d worldlink_cip"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cip_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cip_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cip_app
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      qdrant:   { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL:      postgresql+asyncpg://cip_user:cip_password@postgres:5432/worldlink_cip
      DATABASE_URL_SYNC: postgresql://cip_user:cip_password@postgres:5432/worldlink_cip
      REDIS_URL:         redis://redis:6379/0
      QDRANT_URL:        http://qdrant:6333
      APP_ENV:           production
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cip_worker
    command: celery -A app.ingestion.tasks.celery_app worker --loglevel=info --queues=scrape,reports -c 3
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL:      postgresql+asyncpg://cip_user:cip_password@postgres:5432/worldlink_cip
      DATABASE_URL_SYNC: postgresql://cip_user:cip_password@postgres:5432/worldlink_cip
      REDIS_URL:         redis://redis:6379/0
      QDRANT_URL:        http://qdrant:6333

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cip_beat
    command: celery -A app.ingestion.tasks.celery_app beat --loglevel=info
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0

  flower:
    image: mher/flower:2.0
    container_name: cip_flower
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "5555:5555"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
